services:

  web:
    build:
      context: .
      dockerfile: web/dockerfile
    container_name: adhan-web
    ports:
      - "${WEB_PORT:-8080}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
      - owntone-media:/srv/media
      - cron-data:/etc/cron.d
    environment:
      - TZ=${TZ:-Europe/Paris}
      - DB_PATH=/app/data/adhan.db
    restart: always

  adhan:
    build:
      context: .
      dockerfile: docker/dockerfile
      args:
        - DEBIAN_VERSION=${DEBIAN_VERSION:-bookworm}
        - GECKODRIVER_VERSION=${GECKODRIVER_VERSION:-v0.34.0}
        - AUTONOMOUS=${AUTONOMOUS:-false}
    container_name: ${CONTAINER_NAME_ADHAN:-adhan-home}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
      - cron-data:/etc/cron.d
    environment:
      - TZ=${TZ:-Europe/Paris}
      - AUTONOMOUS=${AUTONOMOUS:-false}
      - DB_PATH=/app/data/adhan.db
    restart: always

  owntone-init:
    image: alpine
    volumes:
      - owntone-etc:/etc/owntone
      - owntone-media:/srv/media
      - owntone-cache:/var/cache/owntone
    command: sh -c "chown -R ${CURRENT_UID:-1000}:${CURRENT_GID:-1000} /etc/owntone /srv/media /var/cache/owntone"

  owntone:
    container_name: owntone
    image: owntone/owntone:latest
    network_mode: host
    privileged: true
    tmpfs:
      - /run
    environment:
      - UID=${CURRENT_UID:-1000}
      - GID=${CURRENT_GID:-1000}
    volumes:
      - owntone-etc:/etc/owntone
      - owntone-media:/srv/media
      - owntone-cache:/var/cache/owntone
    depends_on:
      owntone-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  cron-data:
  owntone-etc:
  owntone-media:
  owntone-cache:
