services:

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ${CONTAINER_NAME_API:-adhan-api}
    expose:
      - "8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - adhan-data:/app/data
      - owntone-media:/srv/media
      - ./backend/app.py:/app/app.py
      - ./backend/scheduler.py:/app/scheduler.py
      - ./backend/adhan_player.py:/app/adhan_player.py
      - ./backend/db:/app/db
      - ./backend/providers:/app/providers
      - ./backend/cli:/app/cli
      - ./backend/supervisord.conf:/app/supervisord.conf
    environment:
      - TZ=${TZ:-Europe/Paris}
      - DB_PATH=/app/data/adhan.db
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/api/status', timeout=3).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: always

  front:
    build:
      context: ./web
      target: dev
    container_name: ${CONTAINER_NAME_FRONT:-adhan-front}
    ports:
      - "${WEB_PORT:-8080}:5173"
    volumes:
      - ./web:/app
      - /app/node_modules
    depends_on:
      - api
    restart: always

  owntone:
    profiles: ["bundled"]
    container_name: ${CONTAINER_NAME_OWNTONE:-owntone}
    image: owntone/owntone:latest
    network_mode: host
    privileged: true
    tmpfs:
      - /run
    entrypoint: /entrypoint.sh
    environment:
      - UID=${CURRENT_UID:-1000}
      - GID=${CURRENT_GID:-1000}
    volumes:
      - ./owntone/entrypoint.sh:/entrypoint.sh:ro
      - owntone-etc:/etc/owntone
      - owntone-media:/srv/media
      - owntone-cache:/var/cache/owntone
    restart: unless-stopped

volumes:
  adhan-data:
  owntone-etc:
  owntone-media:
  owntone-cache:
