services:

  web:
    build:
      context: .
      dockerfile: web/dockerfile
    container_name: adhan-web
    ports:
      - "${WEB_PORT:-8080}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - adhan-data:/app/data
      - owntone-media:/srv/media
      - cron-data:/etc/cron.d
      - ./web:/app/web
      - ./db:/app/db
      - ./providers:/app/providers
    environment:
      - TZ=${TZ:-Europe/Paris}
      - DB_PATH=/app/data/adhan.db
    command: uvicorn web.app:app --host 0.0.0.0 --port 8080 --reload
    restart: always

  adhan:
    build:
      context: .
      dockerfile: docker/dockerfile
      args:
        - DEBIAN_VERSION=${DEBIAN_VERSION:-bookworm}
        - GECKODRIVER_VERSION=${GECKODRIVER_VERSION:-v0.34.0}
        - AUTONOMOUS=${AUTONOMOUS:-false}
    container_name: ${CONTAINER_NAME_ADHAN:-adhan-home}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - adhan-data:/app/data
      - cron-data:/etc/cron.d
    environment:
      - TZ=${TZ:-Europe/Paris}
      - AUTONOMOUS=${AUTONOMOUS:-false}
      - DB_PATH=/app/data/adhan.db
    restart: always

  owntone:
    container_name: owntone
    image: owntone/owntone:latest
    network_mode: host
    privileged: true
    tmpfs:
      - /run
    entrypoint: /entrypoint.sh
    environment:
      - UID=${CURRENT_UID:-1000}
      - GID=${CURRENT_GID:-1000}
    volumes:
      - ./owntone-entrypoint.sh:/entrypoint.sh:ro
      - owntone-etc:/etc/owntone
      - owntone-media:/srv/media
      - owntone-cache:/var/cache/owntone
    restart: unless-stopped

volumes:
  adhan-data:
  cron-data:
  owntone-etc:
  owntone-media:
  owntone-cache:
