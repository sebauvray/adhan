services:

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ${CONTAINER_NAME_API:-adhan-api}
    expose:
      - "8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - adhan-data:/app/data
      - audio-media:/srv/media
      - ./backend/app.py:/app/app.py
      - ./backend/scheduler.py:/app/scheduler.py
      - ./backend/adhan_player.py:/app/adhan_player.py
      - ./backend/audio:/app/audio
      - ./backend/db:/app/db
      - ./backend/providers:/app/providers
      - ./backend/cli:/app/cli
      - ./backend/supervisord.conf:/app/supervisord.conf
    environment:
      - TZ=${TZ:-Europe/Paris}
      - DB_PATH=/app/data/adhan.db
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      - AUDIO_PROVIDER=${AUDIO_PROVIDER:-music-assistant}
      - MA_HOST=${MA_HOST:-host.docker.internal}
      - MA_PORT=${MA_PORT:-8095}
      - MA_TOKEN=${MA_TOKEN:-}
      - AUDIO_BASE_URL=${AUDIO_BASE_URL:-http://host.docker.internal:8001}
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/api/status', timeout=3).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: always

  front:
    build:
      context: ./web
      target: dev
    container_name: ${CONTAINER_NAME_FRONT:-adhan-front}
    ports:
      - "${WEB_PORT:-8080}:5173"
    volumes:
      - ./web:/app
      - /app/node_modules
    depends_on:
      - api
    restart: always

  music-assistant:
    profiles: ["music-assistant"]
    container_name: ${CONTAINER_NAME_MA:-adhan-music-assistant}
    image: ghcr.io/music-assistant/server:latest
    network_mode: host
    cap_add:
      - SYS_ADMIN
      - DAC_READ_SEARCH
    security_opt:
      - apparmor:unconfined
    volumes:
      - ma-data:/data
      # Same volume the api writes adhan/alert uploads to. MA scans /media
      # via its built-in 'Filesystem Local' provider so the user can see
      # and pick the file from the MA library too. Read-only because MA
      # never writes here — uploads only flow through /api/upload-adhan.
      - audio-media:/media:ro
    environment:
      - LOG_LEVEL=${MA_LOG_LEVEL:-info}
    restart: unless-stopped

  owntone:
    profiles: ["owntone"]
    container_name: ${CONTAINER_NAME_OWNTONE:-adhan-owntone}
    image: owntone/owntone:latest
    network_mode: host
    privileged: true
    tmpfs:
      - /run
    entrypoint: /entrypoint.sh
    environment:
      - UID=${CURRENT_UID:-1000}
      - GID=${CURRENT_GID:-1000}
    volumes:
      - ./owntone/entrypoint.sh:/entrypoint.sh:ro
      - owntone-etc:/etc/owntone
      - audio-media:/srv/media
      - owntone-cache:/var/cache/owntone
    restart: unless-stopped

volumes:
  adhan-data:
  audio-media:
  ma-data:
  owntone-etc:
  owntone-cache:
