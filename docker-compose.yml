services:

  web:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ${CONTAINER_NAME_WEB:-adhan-web}
    ports:
      - "${WEB_PORT:-8080}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - adhan-data:/app/data
      - owntone-media:/srv/media
      - cron-data:/etc/cron.d
      - ./backend/app.py:/app/app.py
      - ./backend/db:/app/db
      - ./backend/providers:/app/providers
      - ./backend/cli:/app/cli
      - ./frontend/static:/app/static
      - ./frontend/templates:/app/templates
    environment:
      - TZ=${TZ:-Europe/Paris}
      - DB_PATH=/app/data/adhan.db
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
    command: uvicorn app:app --host 0.0.0.0 --port 8080 --reload
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/api/status', timeout=3).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: always

  adhan:
    build:
      context: .
      dockerfile: scheduler/Dockerfile
      args:
        - DEBIAN_VERSION=${DEBIAN_VERSION:-bookworm}
        - GECKODRIVER_VERSION=${GECKODRIVER_VERSION:-v0.34.0}
        - AUTONOMOUS=${AUTONOMOUS:-false}
    container_name: ${CONTAINER_NAME_ADHAN:-adhan-home}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - adhan-data:/app/data
      - cron-data:/etc/cron.d
    environment:
      - TZ=${TZ:-Europe/Paris}
      - AUTONOMOUS=${AUTONOMOUS:-false}
      - DB_PATH=/app/data/adhan.db
    healthcheck:
      test: ["CMD-SHELL", "pgrep cron > /dev/null && test -s /etc/cron.d/salat"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: always

  owntone:
    container_name: ${CONTAINER_NAME_OWNTONE:-owntone}
    image: owntone/owntone:latest
    network_mode: host
    privileged: true
    tmpfs:
      - /run
    entrypoint: /entrypoint.sh
    environment:
      - UID=${CURRENT_UID:-1000}
      - GID=${CURRENT_GID:-1000}
    volumes:
      - ./owntone/entrypoint.sh:/entrypoint.sh:ro
      - owntone-etc:/etc/owntone
      - owntone-media:/srv/media
      - owntone-cache:/var/cache/owntone
    restart: unless-stopped

volumes:
  adhan-data:
  cron-data:
  owntone-etc:
  owntone-media:
  owntone-cache:
