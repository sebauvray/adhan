services:

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ${CONTAINER_NAME_API:-adhan-api}
    expose:
      - "8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - adhan-data:/app/data
      # Native OwnTone: bind the host library dir at its *same absolute path* so
      # OwnTone's `path is "..."` search matches what we store. Legacy/no native:
      # falls back to the named volume at /srv/media.
      - ${OWNTONE_MEDIA_DIR:-audio-media}:${OWNTONE_MEDIA_DIR:-/srv/media}
      - ${ADHAN_HOST_DIR:-.}/backend/app.py:/app/app.py
      - ${ADHAN_HOST_DIR:-.}/backend/scheduler.py:/app/scheduler.py
      - ${ADHAN_HOST_DIR:-.}/backend/adhan_player.py:/app/adhan_player.py
      - ${ADHAN_HOST_DIR:-.}/backend/audio:/app/audio
      - ${ADHAN_HOST_DIR:-.}/backend/db:/app/db
      - ${ADHAN_HOST_DIR:-.}/backend/providers:/app/providers
      - ${ADHAN_HOST_DIR:-.}/backend/cli:/app/cli
      - ${ADHAN_HOST_DIR:-.}/backend/trackers:/app/trackers
      - ${ADHAN_HOST_DIR:-.}/backend/supervisord.conf:/app/supervisord.conf
      # Docker control: socket + compose context, so the api can start
      # the chosen audio provider container after the user confirms in the wizard.
      - /var/run/docker.sock:/var/run/docker.sock
      - ${ADHAN_HOST_DIR:-.}/docker-compose.yml:/compose/docker-compose.yml:ro
      - ${ADHAN_HOST_DIR:-.}/owntone:/compose/owntone:ro
      - ${ADHAN_HOST_DIR:-.}/.env:/compose/.env:ro
    environment:
      - TZ=${TZ:-Europe/Paris}
      - DB_PATH=/app/data/adhan.db
      - MEDIA_DIR=${OWNTONE_MEDIA_DIR:-/srv/media}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      - COMPOSE_DIR=/compose
      - COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME:-adhan}
      # Host filesystem path of the project — needed when the api spawns
      # provider containers via docker compose, because bind-mount sources
      # are resolved against the *daemon's* (host) filesystem.
      - ADHAN_HOST_DIR=${ADHAN_HOST_DIR:-/host-project-dir-not-set}
      - AUDIO_BASE_URL=${AUDIO_BASE_URL:-http://host.docker.internal:8001}
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/api/status', timeout=3).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: always

  front:
    build:
      context: ./web
      target: dev
    container_name: ${CONTAINER_NAME_FRONT:-adhan-front}
    ports:
      - "${WEB_PORT:-8080}:5173"
    volumes:
      - ${ADHAN_HOST_DIR:-.}/web:/app
      - /app/node_modules
    depends_on:
      - api
    restart: always

  music-assistant:
    profiles: ["music-assistant"]
    container_name: ${CONTAINER_NAME_MA:-adhan-music-assistant}
    image: ghcr.io/music-assistant/server:${MA_IMAGE_TAG:-2.9.1}
    network_mode: host
    cap_add:
      - SYS_ADMIN
      - DAC_READ_SEARCH
    security_opt:
      - apparmor:unconfined
    volumes:
      - ma-data:/data
      # Same volume the api writes adhan/alert uploads to. After onboarding,
      # the api registers MA's built-in 'Filesystem Local' provider on /media
      # (see ensure_media_filesystem_provider) so uploads show up in the MA
      # library. Read-only because MA never writes here — uploads only flow
      # through /api/upload-adhan.
      - audio-media:/media:ro
    environment:
      - LOG_LEVEL=${MA_LOG_LEVEL:-info}
    restart: unless-stopped

  owntone:
    profiles: ["owntone"]
    container_name: ${CONTAINER_NAME_OWNTONE:-adhan-owntone}
    image: owntone/owntone:${OWNTONE_IMAGE_TAG:-29.2}
    network_mode: host
    privileged: true
    tmpfs:
      - /run
    entrypoint: /entrypoint.sh
    environment:
      - UID=${CURRENT_UID:-1000}
      - GID=${CURRENT_GID:-1000}
    volumes:
      - ${ADHAN_HOST_DIR:-.}/owntone/entrypoint.sh:/entrypoint.sh:ro
      - owntone-etc:/etc/owntone
      - audio-media:/srv/media
      - owntone-cache:/var/cache/owntone
    restart: unless-stopped

volumes:
  adhan-data:
  audio-media:
  ma-data:
  owntone-etc:
  owntone-cache:
