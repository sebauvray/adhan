<div class="settings-header">
  <div class="header-left">
    <a href="/dashboard"><img src="/static/logo-without-background.png" alt="Adhan Home" class="logo" style="height:120px;margin:0"></a>
  </div>
  <div class="header-center">
    <h1 style="font-size:2.2rem;font-weight:700">{{ title }}</h1>
    <p style="font-size:0.9rem;color:var(--text-dark-muted);font-style:italic">{{ subtitle }}</p>
  </div>
  <div class="header-right" style="display:flex;flex-direction:column;align-items:flex-end;gap:0.4rem">
    <a href="/dashboard" class="link-action">&larr; Dashboard</a>
    <a href="#" class="link-action" onclick="logout(event)">Déconnexion</a>
  </div>
</div>

<script>
  async function logout(e) {
    e.preventDefault();
    await fetch('/api/logout', { method: 'POST', credentials: 'same-origin' });
    window.location.href = '/login';
  }
</script>
