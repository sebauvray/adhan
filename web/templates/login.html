<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adhan Home - Connexion</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="page">
  <div class="card">
    <img src="/static/logo.png" alt="Adhan Home" class="logo">
    <h1>Adhan Home</h1>
    <p class="subtitle">Connexion administrateur</p>

    <form id="login-form" autocomplete="on">
      <div class="form-group">
        <label for="username">Identifiant</label>
        <input type="text" id="username" name="username" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <div id="login-error" class="msg msg-error" style="display:none;margin-top:0.5rem"></div>
      <div class="actions" style="margin-top:1.2rem">
        <a href="/dashboard" class="btn btn-secondary">Retour au tableau</a>
        <button type="submit" id="login-submit" class="btn btn-action">Se connecter</button>
      </div>
    </form>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-submit');
      const err = document.getElementById('login-error');
      err.style.display = 'none';
      btn.disabled = true;
      btn.innerHTML = 'Connexion<span class="spinner"></span>';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const resp = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ username, password }),
        });
        if (resp.ok) {
          const next = new URLSearchParams(window.location.search).get('next') || '/settings';
          window.location.href = next;
          return;
        }
        const data = await resp.json().catch(() => ({}));
        err.textContent = data.detail || 'Identifiants invalides';
        err.style.display = 'block';
      } catch (e) {
        err.textContent = 'Erreur de connexion';
        err.style.display = 'block';
      }
      btn.disabled = false;
      btn.textContent = 'Se connecter';
    });
  </script>
</body>
</html>
