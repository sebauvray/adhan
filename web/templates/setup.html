<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adhan Home - Installation</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="page">
  <div class="card">
    <h1>Adhan Home</h1>
    <p class="subtitle">Configurez votre appel à la prière automatisé</p>

    <form id="setup-form" onsubmit="submitSetup(event)">

      <div class="form-section">
        <h2>Votre mosquée</h2>
        <p style="font-size:0.8rem;color:var(--text-dark-muted);margin-bottom:0.8rem">
          Rendez-vous sur <a href="https://mawaqit.net" target="_blank" style="color:var(--accent)">mawaqit.net</a>,
          recherchez votre mosquée et copiez l'URL de sa page.
        </p>
        <div class="form-group">
          <label for="mosque_url">URL mawaqit.net</label>
          <div style="display:flex;gap:0.5rem">
            <input type="url" id="mosque_url" name="mosque_url" placeholder="https://mawaqit.net/fr/m/votre-mosquee" required style="flex:1">
            <button type="button" id="validate-btn" class="btn btn-secondary" onclick="validateUrl()">Vérifier</button>
          </div>
        </div>
        <div id="url-preview"></div>
      </div>

      <div class="actions">
        <span></span>
        <button type="submit" id="submit-btn" class="btn btn-primary" disabled>Installer</button>
      </div>

      <div id="setup-msg"></div>
    </form>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
