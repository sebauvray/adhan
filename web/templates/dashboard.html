<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adhan Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="dashboard-page">
  <div class="dashboard">
    <div class="panel-left">
      <div class="top-bar">
        <div class="weather" id="weather">
          <!-- Location: pin icon + city name -->
          <div class="weather-location">
            <svg class="weather-pin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/>
              <circle cx="12" cy="10" r="3"/>
            </svg>
            <span id="weather-city"></span>
          </div>
          <!-- Condition: weather image + temperature -->
          <div class="weather-condition">
            <span class="weather-icon" id="weather-icon"></span>
            <span class="weather-temp" id="weather-temp"></span>
          </div>
        </div>
        <div class="clock">
          <div class="clock__date" id="clock-date"></div>
          <div class="clock__time" id="clock-time"></div>
        </div>
      </div>

      <div class="prayers-list" id="prayers-list"></div>
    </div>

    <div class="panel-right">
      <a href="/settings" class="icon-btn icon-btn--light settings-global" title="Paramètres">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </a>
      <div class="next-prayer" id="next-prayer">
        <div class="next-header">
          <div class="next-label">Prochaine Prière</div>
          <div class="countdown" id="countdown"></div>
        </div>
        <div class="next-arabic" id="next-arabic"></div>
        <div class="next-time" id="next-time"></div>
        <div id="next-iqama"></div>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
