<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adhan Home - Paramètres</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="settings-page">
  <div class="settings">

    <div class="settings-header">
      <div>
        <img src="/static/logo.png" alt="Adhan Home" class="logo" style="height:80px;margin:0">
      </div>
      <div>
        <h1 style="font-size:1.8rem;font-weight:600">Paramètres</h1>
        <p style="font-size:0.85rem;color:var(--text-dark-muted)">Sauvegarde automatique</p>
      </div>
      <div>
        <a href="/dashboard" class="link-action">&larr; Dashboard</a>
      </div>
    </div>

    <div class="settings-content">
      <div class="settings-left">
        <div class="form-section">
          <h2>Mosquée</h2>
          <div class="form-group">
            <label for="mosque_url">URL mawaqit.net</label>
            <span class="save-indicator" id="save-mosque_url">Sauvegardé</span>
            <input type="url" id="mosque_url" data-table="config" data-key="MOSQUE_URL">
          </div>
        </div>

        <details class="form-section">
          <summary style="cursor:pointer;font-size:0.85rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-dark-muted);padding-bottom:0.4rem;border-bottom:1px solid rgba(0,0,0,0.06)">
            Avancé
          </summary>
          <div style="margin-top:0.8rem">
            <div class="form-row">
              <div class="form-group">
                <label for="log_level">Niveau de log</label>
                <span class="save-indicator" id="save-log_level">Sauvegardé</span>
                <select id="log_level" data-table="config" data-key="LOG_LEVEL">
                  <option value="DEBUG">DEBUG</option>
                  <option value="INFO">INFO</option>
                  <option value="WARN">WARN</option>
                  <option value="ERROR">ERROR</option>
                </select>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="owntone_host">OwnTone hôte</label>
                <span class="save-indicator" id="save-owntone_host">Sauvegardé</span>
                <input type="text" id="owntone_host" data-table="owntone" data-key="HOST">
              </div>
              <div class="form-group">
                <label for="owntone_port">OwnTone port</label>
                <span class="save-indicator" id="save-owntone_port">Sauvegardé</span>
                <input type="text" id="owntone_port" data-table="owntone" data-key="PORT">
              </div>
            </div>
            <div class="form-row" style="margin-top:0.5rem">
              <div class="form-group">
                <label for="quiet_start">Heures calmes — début</label>
                <span class="save-indicator" id="save-quiet_start">Sauvegardé</span>
                <input type="time" id="quiet_start" data-table="config" data-key="QUIET_START">
              </div>
              <div class="form-group">
                <label for="quiet_end">Heures calmes — fin</label>
                <span class="save-indicator" id="save-quiet_end">Sauvegardé</span>
                <input type="time" id="quiet_end" data-table="config" data-key="QUIET_END">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="quiet_volume">Volume max (heures calmes)</label>
                <span class="save-indicator" id="save-quiet_volume">Sauvegardé</span>
                <input type="number" id="quiet_volume" data-table="config" data-key="QUIET_VOLUME" min="0" max="100">
              </div>
            </div>
          </div>
        </details>

        <div class="form-section">
          <h2>Authentification</h2>
          <div class="form-group">
            <label for="api_token">Token API</label>
            <span class="save-indicator" id="save-api_token">Sauvegardé</span>
            <input type="text" id="api_token" placeholder="Collez votre token ici">
          </div>
        </div>
      </div>

      <div class="settings-right">
        <div class="form-section">
          <h2>Alertes sonores</h2>
          <div class="form-group">
            <label class="checkbox-label">
              <input type="checkbox" id="sound_enabled" data-table="config" data-key="SOUND_ENABLED">
              Activer l'appel à la prière sur les enceintes
            </label>
          </div>

          <div id="sound-config" style="display:none">
            <div style="margin-top:0.8rem">
              <div class="form-group">
                <label>Fichier audio</label>
                <input type="file" id="adhan_upload" accept=".mp3,.wav,.ogg,.m4a,.flac" style="display:none">
                <div class="upload-component">
                  <div id="upload-default">
                    <span style="font-size:0.8rem;color:var(--text-dark-muted)">Fichier par défaut</span>
                    <button type="button" class="btn btn-action" style="font-size:0.75rem;padding:0.3rem 0.8rem;margin-left:0.5rem" onclick="document.getElementById('adhan_upload').click()">
                      Personnaliser
                    </button>
                  </div>
                  <div id="upload-custom" style="display:none">
                    <span class="upload-file-tag">
                      <span class="filename" id="upload-filename"></span>
                      <button type="button" class="remove-btn" id="upload-remove" title="Supprimer">&times;</button>
                    </span>
                  </div>
                </div>
                <div id="upload-status" style="font-size:0.75rem;margin-top:0.3rem"></div>
              </div>
            </div>
            <p style="margin-top:0.5rem;font-size:0.8rem">
              <a id="owntone-link" href="#" target="_blank" class="link-action">
                Gérer les enceintes dans OwnTone &rarr;
              </a>
            </p>
          </div>
        </div>

        <div class="form-section">
          <h2>Réglage par prière</h2>
          <div id="prayer-outputs-config">
            <p style="font-size:0.8rem;color:var(--text-dark-muted)">Chargement des enceintes...</p>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script src="/static/app.js"></script>
  <script>
    // --- Auto-save per field ---

    const API_CONFIG_FIELD = '/api/config-field';

    function showSaved(inputEl) {
      inputEl.classList.add('saved');
      const indicator = document.getElementById('save-' + inputEl.id);
      if (indicator) indicator.classList.add('visible');
      setTimeout(() => {
        inputEl.classList.remove('saved');
        if (indicator) indicator.classList.remove('visible');
      }, 2000);
    }

    function showCardSaved(card) {
      card.classList.add('saved');
      setTimeout(() => card.classList.remove('saved'), 2000);
    }

    async function saveField(table, key, value) {
      const token = localStorage.getItem('adhan_token');
      await fetch(API_CONFIG_FIELD, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': token ? `Bearer ${token}` : '',
        },
        body: JSON.stringify({ table, key, value }),
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      // Load current config
      fetch('/api/config').then(r => r.json()).then(data => {
        const map = {
          'mosque_url': data.mosque_url,
          'log_level': data.log_level,
          'owntone_host': data.owntone_host,
          'owntone_port': data.owntone_port,
          'quiet_start': data.quiet_start,
          'quiet_end': data.quiet_end,
          'quiet_volume': data.quiet_volume,
        };
        Object.entries(map).forEach(([id, val]) => {
          const el = document.getElementById(id);
          if (el && val) el.value = val;
        });

        // Sound checkbox
        const toggle = document.getElementById('sound_enabled');
        if (toggle) {
          toggle.checked = data.sound_enabled === 'true';
          document.getElementById('sound-config').style.display = toggle.checked ? 'block' : 'none';
        }

        // Upload file state
        const file = data.adhan_file || '';
        if (file && file !== '/srv/media/adhan.mp3') showCustomFile(file.split('/').pop());

        // OwnTone link
        updateOwntoneLink();
      });

      // Auto-save: text/url/number inputs on blur
      document.querySelectorAll('input[data-table], select[data-table]').forEach(el => {
        if (el.type === 'checkbox') return;
        let original = '';
        el.addEventListener('focus', () => { original = el.value; });
        el.addEventListener('blur', async () => {
          if (el.value !== original) {
            await saveField(el.dataset.table, el.dataset.key, el.value);
            showSaved(el);
          }
        });
        if (el.tagName === 'SELECT') {
          el.addEventListener('change', async () => {
            await saveField(el.dataset.table, el.dataset.key, el.value);
            showSaved(el);
          });
        }
      });

      // Auto-save: checkbox
      const toggle = document.getElementById('sound_enabled');
      const config = document.getElementById('sound-config');
      if (toggle) {
        toggle.addEventListener('change', async () => {
          config.style.display = toggle.checked ? 'block' : 'none';
          await saveField('config', 'SOUND_ENABLED', toggle.checked ? 'true' : 'false');
        });
      }

      // Token (local only)
      const stored = localStorage.getItem('adhan_token');
      const tokenInput = document.getElementById('api_token');
      if (stored && tokenInput) tokenInput.value = stored;
      if (tokenInput) {
        let origToken = stored || '';
        tokenInput.addEventListener('focus', () => { origToken = tokenInput.value; });
        tokenInput.addEventListener('blur', () => {
          if (tokenInput.value !== origToken) {
            localStorage.setItem('adhan_token', tokenInput.value);
            showSaved(tokenInput);
          }
        });
      }

      // Prayer outputs
      loadPrayerOutputs();

      // Upload handlers
      const fileInput = document.getElementById('adhan_upload');
      if (fileInput) {
        fileInput.addEventListener('change', async () => {
          const file = fileInput.files[0];
          if (!file) return;
          const status = document.getElementById('upload-status');
          status.textContent = 'Envoi en cours...';
          status.style.color = 'var(--text-dark-muted)';
          const formData = new FormData();
          formData.append('file', file);
          try {
            const resp = await fetch('/api/upload-adhan', { method: 'POST', body: formData });
            const data = await resp.json();
            if (data.success) { showCustomFile(data.filename); status.textContent = ''; }
            else { status.textContent = data.detail || 'Erreur'; status.style.color = '#c53030'; }
          } catch (e) { status.textContent = 'Erreur'; status.style.color = '#c53030'; }
        });
      }

      const removeBtn = document.getElementById('upload-remove');
      if (removeBtn) {
        removeBtn.addEventListener('click', async () => {
          if (!confirm('Supprimer le fichier audio personnalisé ?')) return;
          await fetch('/api/upload-adhan', { method: 'DELETE' });
          showDefaultFile();
        });
      }
    });

    function showCustomFile(name) {
      document.getElementById('upload-default').style.display = 'none';
      document.getElementById('upload-custom').style.display = 'inline-flex';
      document.getElementById('upload-filename').textContent = name;
    }
    function showDefaultFile() {
      document.getElementById('upload-default').style.display = 'inline-flex';
      document.getElementById('upload-custom').style.display = 'none';
    }

    // --- Prayer outputs ---

    const PRAYERS = ['Fajr', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'];
    const PRAYER_LABELS = { Fajr: 'Fajr', Dhuhr: 'Dohr', Asr: 'Asr', Maghrib: 'Maghrib', Isha: 'Icha' };

    async function loadPrayerOutputs() {
      const container = document.getElementById('prayer-outputs-config');
      if (!container) return;
      try {
        const [outputsResp, configResp] = await Promise.all([fetch('/api/outputs'), fetch('/api/prayer-outputs')]);
        if (!outputsResp.ok) { container.innerHTML = '<p style="font-size:0.8rem;color:#c53030">OwnTone inaccessible.</p>'; return; }
        const outputs = (await outputsResp.json()).outputs || [];
        const cfg = await configResp.json();
        const prayerOutputs = cfg.outputs || {};
        const prayerVolumes = cfg.volumes || {};

        container.innerHTML = PRAYERS.map(prayer => {
          const selectedIds = (prayerOutputs[prayer] || []).map(o => o.id);
          const volume = prayerVolumes[prayer] ?? 30;
          return `
            <div class="prayer-config-card" data-prayer="${prayer}">
              <div class="prayer-config-header">
                <span class="prayer-config-name">${PRAYER_LABELS[prayer] || prayer}</span>
                <button type="button" class="prayer-test-btn" data-prayer="${prayer}" onclick="toggleTestPrayer(this)" title="Tester">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5,3 19,12 5,21"/></svg>
                </button>
              </div>
              <div class="prayer-config-outputs" data-prayer="${prayer}">
                ${outputs.map(o => `
                  <label class="output-chip ${selectedIds.includes(o.id) ? 'selected' : ''}" data-id="${o.id}" data-name="${o.name}">
                    <input type="checkbox" ${selectedIds.includes(o.id) ? 'checked' : ''}>
                    ${o.name}
                  </label>
                `).join('')}
              </div>
              <div class="prayer-volume">
                <span>Volume</span>
                <input type="range" min="0" max="100" value="${volume}" data-prayer="${prayer}" oninput="this.nextElementSibling.textContent=this.value">
                <span class="prayer-volume-value">${volume}</span>
              </div>
            </div>`;
        }).join('');

        // Chip click -> auto-save
        container.querySelectorAll('.output-chip').forEach(chip => {
          chip.addEventListener('click', async () => {
            const cb = chip.querySelector('input');
            cb.checked = !cb.checked;
            chip.classList.toggle('selected', cb.checked);
            const card = chip.closest('.prayer-config-card');
            await savePrayerCard(card.dataset.prayer);
            showCardSaved(card);
          });
        });

        // Volume change -> auto-save
        container.querySelectorAll('.prayer-volume input[type="range"]').forEach(slider => {
          slider.addEventListener('change', async () => {
            const card = slider.closest('.prayer-config-card');
            await savePrayerCard(card.dataset.prayer);
            showCardSaved(card);
          });
        });
      } catch (e) {
        container.innerHTML = '<p style="font-size:0.8rem;color:#c53030">Erreur de chargement</p>';
      }
    }

    async function savePrayerCard(prayer) {
      const card = document.querySelector(`.prayer-config-card[data-prayer="${prayer}"]`);
      if (!card) return;
      const selected = [];
      card.querySelectorAll('.output-chip input:checked').forEach(cb => {
        const chip = cb.closest('.output-chip');
        selected.push({ id: chip.dataset.id, name: chip.dataset.name });
      });
      const volume = parseInt(card.querySelector('input[type="range"]').value);
      const token = localStorage.getItem('adhan_token');
      await fetch('/api/prayer-outputs', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': token ? `Bearer ${token}` : '' },
        body: JSON.stringify({ outputs: { [prayer]: selected }, volumes: { [prayer]: volume } }),
      });
    }

    // --- Play/Stop test ---

    let currentlyPlaying = null;

    async function toggleTestPrayer(btn) {
      const prayer = btn.dataset.prayer;

      if (currentlyPlaying === prayer) {
        await fetch('/api/stop-playback', { method: 'POST' });
        btn.classList.remove('playing');
        btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5,3 19,12 5,21"/></svg>';
        currentlyPlaying = null;
        return;
      }

      if (currentlyPlaying) {
        await fetch('/api/stop-playback', { method: 'POST' });
        const prevBtn = document.querySelector('.prayer-test-btn.playing');
        if (prevBtn) {
          prevBtn.classList.remove('playing');
          prevBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5,3 19,12 5,21"/></svg>';
        }
      }

      await savePrayerCard(prayer);

      try {
        const resp = await fetch('/api/test-prayer/' + prayer, { method: 'POST' });
        if (resp.ok) {
          btn.classList.add('playing');
          btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none"><rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/></svg>';
          currentlyPlaying = prayer;
        } else {
          const data = await resp.json();
          alert(data.detail || 'Erreur');
        }
      } catch (e) {
        alert('Erreur de connexion');
      }
    }
  </script>
</body>
</html>
