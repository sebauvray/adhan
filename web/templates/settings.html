<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adhan Home - Paramètres</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    body.settings-page {
      overflow: hidden;
      background: var(--light);
    }

    .settings-wrapper {
      display: flex;
      flex-direction: column;
      width: 100vw;
      height: 100vh;
    }

    /* Header */
    .settings-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 3rem 0;
      background: white;
    }

    .settings-header .logo { height: 70px; margin: 0; }

    /* Title bar */
    .settings-title {
      padding: 1rem 3rem;
      background: white;
    }
    .settings-title h1 { font-size: 1.4rem; margin-bottom: 0.2rem; }
    .settings-title .subtitle { font-size: 0.8rem; color: var(--text-dark-muted); }

    /* Panels container */
    .settings-panels {
      flex: 1;
      display: flex;
      position: relative;
      background: white;
      overflow: hidden;
    }

    .settings-left {
      flex: 0 0 52%;
      padding: 1.5rem 3rem;
      overflow-y: auto;
      z-index: 2;
    }

    .settings-right {
      position: absolute;
      top: 0;
      right: 0;
      width: 50%;
      height: 100%;
      background: white;
      z-index: 3;
      clip-path: polygon(6% 0, 100% 0, 100% 100%, 0% 100%);
      padding: 1.5rem 2.5rem 1.5rem 5%;
      overflow-y: auto;
    }

    .settings-right::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--accent);
      clip-path: polygon(6% 0, calc(6% + 4px) 0, 4px 100%, 0% 100%);
      z-index: 5;
      pointer-events: none;
    }

    /* Footer */
    .settings-footer {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 0.8rem;
      padding: 1rem 3rem;
      background: white;
      border-top: 1px solid rgba(0,0,0,0.06);
    }

    #settings-msg {
      flex: 1;
    }

    /* Prayer cards */
    .prayer-config-card {
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 8px;
      padding: 0.8rem;
      margin-bottom: 0.6rem;
    }
    .prayer-config-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }
    .prayer-config-name { font-weight: 600; font-size: 0.9rem; }
    .prayer-config-outputs { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .output-chip {
      display: flex; align-items: center; gap: 0.3rem;
      font-size: 0.75rem; padding: 0.25rem 0.6rem;
      border-radius: 20px; border: 1px solid rgba(0,0,0,0.1);
      cursor: pointer; transition: all 0.15s; user-select: none;
    }
    .output-chip:hover { border-color: rgba(0,0,0,0.2); }
    .output-chip.selected { background: var(--accent); color: white; border-color: var(--accent); }
    .output-chip input { display: none; }
    .prayer-volume {
      display: flex; align-items: center; gap: 0.5rem;
      margin-top: 0.5rem; font-size: 0.75rem; color: var(--text-dark-muted);
    }
    .prayer-volume input[type="range"] { flex: 1; accent-color: var(--accent); height: 4px; }
    .prayer-volume-value { min-width: 2rem; text-align: right; font-weight: 600; color: var(--accent); }

    /* Upload component */
    .upload-component {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.3rem;
    }
    .upload-file-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
      background: rgba(0,0,0,0.04);
      padding: 0.35rem 0.6rem;
      border-radius: 6px;
    }
    .upload-file-tag .filename { color: var(--accent); font-weight: 500; }
    .upload-file-tag .remove-btn {
      background: none; border: none; cursor: pointer;
      font-size: 1.1rem; color: var(--text-dark-muted); line-height: 1; padding: 0;
    }
    .upload-file-tag .remove-btn:hover { color: #c53030; }
  </style>
</head>
<body class="settings-page">
  <form id="settings-form" onsubmit="submitSettings(event)">
    <div class="settings-wrapper">

      <!-- Header -->
      <div class="settings-header">
        <img src="/static/logo.png" alt="Adhan Home" class="logo">
        <a href="/dashboard" class="back-link">&larr; Retour au dashboard</a>
      </div>

      <!-- Title -->
      <div class="settings-title">
        <h1>Paramètres</h1>
        <p class="subtitle">Modifier la configuration d'Adhan Home</p>
      </div>

      <!-- Two panels -->
      <div class="settings-panels">

        <!-- Left: general config -->
        <div class="settings-left">
          <div class="form-section">
            <h2>Mosquée</h2>
            <div class="form-group">
              <label for="mosque_url">URL mawaqit.net</label>
              <input type="url" id="mosque_url" name="mosque_url" required>
            </div>
          </div>

          <details class="form-section">
            <summary style="cursor:pointer;font-size:0.85rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-dark-muted);padding-bottom:0.4rem;border-bottom:1px solid rgba(0,0,0,0.06)">
              Avancé
            </summary>
            <div style="margin-top:0.8rem">
              <div class="form-row">
                <div class="form-group">
                  <label for="log_level">Niveau de log</label>
                  <select id="log_level" name="log_level">
                    <option value="DEBUG">DEBUG</option>
                    <option value="INFO">INFO</option>
                    <option value="WARN">WARN</option>
                    <option value="ERROR">ERROR</option>
                  </select>
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label for="owntone_host">OwnTone hôte</label>
                  <input type="text" id="owntone_host" name="owntone_host">
                </div>
                <div class="form-group">
                  <label for="owntone_port">OwnTone port</label>
                  <input type="text" id="owntone_port" name="owntone_port">
                </div>
              </div>
            </div>
          </details>

          <div class="form-section">
            <h2>Authentification</h2>
            <div class="form-group">
              <label for="api_token">Token API</label>
              <input type="text" id="api_token" placeholder="Collez votre token ici">
              <button type="button" class="btn btn-secondary" style="margin-top:0.5rem;font-size:0.8rem" onclick="saveToken()">Sauvegarder le token</button>
            </div>
          </div>
        </div>

        <!-- Right: sound & per-prayer config -->
        <div class="settings-right">
          <div class="form-section">
            <h2>Alertes sonores</h2>
            <div class="form-group">
              <label class="checkbox-label">
                <input type="checkbox" id="sound_enabled" name="sound_enabled" value="true">
                Activer l'appel à la prière sur les enceintes
              </label>
            </div>

            <div id="sound-config" style="display:none">
              <div style="margin-top:0.8rem">
                <div class="form-group">
                  <label>Fichier audio</label>
                  <input type="file" id="adhan_upload" accept=".mp3,.wav,.ogg,.m4a,.flac" style="display:none">
                  <div class="upload-component">
                    <!-- State: no custom file -->
                    <div id="upload-default">
                      <span style="font-size:0.8rem;color:var(--text-dark-muted)">Fichier par défaut</span>
                      <button type="button" class="btn btn-action" style="font-size:0.75rem;padding:0.3rem 0.8rem;margin-left:0.5rem" onclick="document.getElementById('adhan_upload').click()">
                        Personnaliser
                      </button>
                    </div>
                    <!-- State: custom file uploaded -->
                    <div id="upload-custom" style="display:none">
                      <span class="upload-file-tag">
                        <span class="filename" id="upload-filename"></span>
                        <button type="button" class="remove-btn" id="upload-remove" title="Supprimer">&times;</button>
                      </span>
                    </div>
                  </div>
                  <div id="upload-status" style="font-size:0.75rem;margin-top:0.3rem"></div>
                </div>
                <div class="form-group">
                  <label for="adhan_volume">Volume par défaut</label>
                  <input type="number" id="adhan_volume" name="adhan_volume" min="0" max="100">
                </div>
              </div>
              <p style="margin-top:0.5rem;font-size:0.8rem">
                <a id="owntone-link" href="#" target="_blank" class="link-action">
                  Gérer les enceintes dans OwnTone &rarr;
                </a>
              </p>
            </div>
          </div>

          <div class="form-section">
            <h2>Réglage par prière</h2>
            <div id="prayer-outputs-config">
              <p style="font-size:0.8rem;color:var(--text-dark-muted)">Chargement des enceintes...</p>
            </div>
          </div>
        </div>

      </div>

      <!-- Footer: actions for the whole page -->
      <div class="settings-footer">
        <div id="settings-msg"></div>
        <a href="/dashboard" class="btn btn-secondary">Annuler</a>
        <button type="submit" class="btn btn-action">Sauvegarder</button>
      </div>

    </div>
  </form>

  <script src="/static/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Token
      const stored = localStorage.getItem('adhan_token');
      const tokenInput = document.getElementById('api_token');
      if (stored && tokenInput) tokenInput.value = stored;

      // Sound toggle
      const toggle = document.getElementById('sound_enabled');
      const config = document.getElementById('sound-config');
      if (toggle && config) {
        toggle.addEventListener('change', () => {
          config.style.display = toggle.checked ? 'block' : 'none';
        });
      }

      // Prayer outputs
      loadPrayerOutputs();

      // Upload: check current file
      fetch('/api/config').then(r => r.json()).then(data => {
        const file = data.adhan_file || '';
        if (file && file !== '/srv/media/adhan.mp3') {
          showCustomFile(file.split('/').pop());
        }
      });

      // Upload: file selected
      const fileInput = document.getElementById('adhan_upload');
      if (fileInput) {
        fileInput.addEventListener('change', async () => {
          const file = fileInput.files[0];
          if (!file) return;
          const status = document.getElementById('upload-status');
          status.textContent = 'Envoi en cours...';
          status.style.color = 'var(--text-dark-muted)';
          const formData = new FormData();
          formData.append('file', file);
          try {
            const resp = await fetch('/api/upload-adhan', { method: 'POST', body: formData });
            const data = await resp.json();
            if (data.success) {
              showCustomFile(data.filename);
              status.textContent = '';
            } else {
              status.textContent = data.detail || 'Erreur';
              status.style.color = '#c53030';
            }
          } catch (e) {
            status.textContent = 'Erreur de connexion';
            status.style.color = '#c53030';
          }
        });
      }

      // Upload: remove
      const removeBtn = document.getElementById('upload-remove');
      if (removeBtn) {
        removeBtn.addEventListener('click', async () => {
          if (!confirm('Supprimer le fichier audio personnalisé ? Le fichier par défaut sera utilisé.')) return;
          try {
            await fetch('/api/upload-adhan', { method: 'DELETE' });
            showDefaultFile();
            if (fileInput) fileInput.value = '';
          } catch (e) {}
        });
      }
    });

    function showCustomFile(name) {
      document.getElementById('upload-default').style.display = 'none';
      document.getElementById('upload-custom').style.display = 'inline-flex';
      document.getElementById('upload-filename').textContent = name;
    }

    function showDefaultFile() {
      document.getElementById('upload-default').style.display = 'inline-flex';
      document.getElementById('upload-custom').style.display = 'none';
      document.getElementById('upload-status').textContent = '';
    }

    const PRAYERS = ['Fajr', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'];
    const PRAYER_LABELS = { Fajr: 'Fajr', Dhuhr: 'Dohr', Asr: 'Asr', Maghrib: 'Maghrib', Isha: 'Icha' };

    async function loadPrayerOutputs() {
      const container = document.getElementById('prayer-outputs-config');
      if (!container) return;
      try {
        const [outputsResp, configResp] = await Promise.all([
          fetch('/api/outputs'),
          fetch('/api/prayer-outputs'),
        ]);
        if (!outputsResp.ok) {
          container.innerHTML = '<p style="font-size:0.8rem;color:#c53030">OwnTone inaccessible.</p>';
          return;
        }
        const outputs = (await outputsResp.json()).outputs || [];
        const config = await configResp.json();
        const prayerOutputs = config.outputs || {};
        const prayerVolumes = config.volumes || {};

        container.innerHTML = PRAYERS.map(prayer => {
          const selectedIds = (prayerOutputs[prayer] || []).map(o => o.id);
          const volume = prayerVolumes[prayer] ?? 40;
          return `
            <div class="prayer-config-card">
              <div class="prayer-config-header">
                <span class="prayer-config-name">${PRAYER_LABELS[prayer] || prayer}</span>
              </div>
              <div class="prayer-config-outputs" data-prayer="${prayer}">
                ${outputs.map(o => `
                  <label class="output-chip ${selectedIds.includes(o.id) ? 'selected' : ''}" data-id="${o.id}" data-name="${o.name}">
                    <input type="checkbox" ${selectedIds.includes(o.id) ? 'checked' : ''}>
                    ${o.name}
                  </label>
                `).join('')}
              </div>
              <div class="prayer-volume">
                <span>Volume</span>
                <input type="range" min="0" max="100" value="${volume}" data-prayer="${prayer}" oninput="this.nextElementSibling.textContent=this.value">
                <span class="prayer-volume-value">${volume}</span>
              </div>
            </div>
          `;
        }).join('');

        container.querySelectorAll('.output-chip').forEach(chip => {
          chip.addEventListener('click', () => {
            const cb = chip.querySelector('input');
            cb.checked = !cb.checked;
            chip.classList.toggle('selected', cb.checked);
          });
        });
      } catch (e) {
        container.innerHTML = '<p style="font-size:0.8rem;color:#c53030">Erreur de chargement</p>';
      }
    }

    async function savePrayerOutputs() {
      const container = document.getElementById('prayer-outputs-config');
      if (!container) return;
      const outputs = {};
      const volumes = {};
      container.querySelectorAll('.prayer-config-outputs').forEach(row => {
        const prayer = row.dataset.prayer;
        const selected = [];
        row.querySelectorAll('.output-chip input:checked').forEach(cb => {
          const chip = cb.closest('.output-chip');
          selected.push({ id: chip.dataset.id, name: chip.dataset.name });
        });
        outputs[prayer] = selected;
      });
      container.querySelectorAll('.prayer-volume input[type="range"]').forEach(slider => {
        volumes[slider.dataset.prayer] = parseInt(slider.value);
      });
      const token = localStorage.getItem('adhan_token');
      await fetch('/api/prayer-outputs', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': token ? `Bearer ${token}` : '' },
        body: JSON.stringify({ outputs, volumes }),
      });
    }

    function saveToken() {
      const input = document.getElementById('api_token');
      if (input && input.value) {
        localStorage.setItem('adhan_token', input.value);
        alert('Token sauvegardé dans le navigateur.');
      }
    }
  </script>
</body>
</html>
