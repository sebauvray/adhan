<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Combo Hit Proto — Adhan</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Bowlby+One+SC&family=Russo+One&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0e0e1a;
    --bg-2: #1a1a2e;
    --accent: #c8a97e;
    --on-time: #ffd000;
    --on-time-2: #ff6a00;
    --jamaa: #6a5cff;
    --jamaa-2: #00c2ff;
    --double: #ff2a4d;
    --double-2: #ff8a00;
    --perfect: #ffeb3b;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    height: 100%;
    background: radial-gradient(ellipse at center, var(--bg-2) 0%, var(--bg) 70%);
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    overflow: hidden;
  }

  /* ---------- Layout ---------- */

  .stage {
    position: relative;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .counters {
    position: absolute;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 28px;
    align-items: center;
    z-index: 5;
  }
  .counter {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    backdrop-filter: blur(8px);
  }
  .counter .icon { font-size: 1.6rem; line-height: 1; }
  .counter .num {
    font-family: "Russo One", sans-serif;
    font-style: italic;
    font-size: 1.6rem;
    letter-spacing: 0.5px;
    transform: skewX(-8deg);
    display: inline-block;
    transition: transform 60ms ease-out;
  }
  .counter.streak  .num { color: #ff7f3f; text-shadow: 0 0 12px #ff5500aa; }
  .counter.ontime  .num { color: var(--on-time); text-shadow: 0 0 12px var(--on-time-2); }
  .counter.jamaa   .num { color: #9ea3ff; text-shadow: 0 0 12px var(--jamaa); }

  /* Pulse on counter when it gets a hit */
  .counter.hit { animation: counterHit 320ms ease-out; }
  @keyframes counterHit {
    0%   { transform: scale(1); }
    20%  { transform: scale(1.35); filter: drop-shadow(0 0 14px currentColor); }
    60%  { transform: scale(0.95); }
    100% { transform: scale(1); }
  }

  /* ---------- The prayer button ---------- */

  .prayer {
    position: relative;
    width: 180px; height: 180px;
    border-radius: 50%;
    background: linear-gradient(145deg, #2a2a44, #0f0f1f);
    box-shadow:
      inset 0 2px 10px rgba(255,255,255,0.05),
      0 12px 40px rgba(0,0,0,0.6);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer;
    user-select: none;
    border: 2px solid rgba(255,255,255,0.06);
    transition: transform 80ms ease-out;
  }
  .prayer:active { transform: scale(0.96); }
  .prayer .label {
    font-family: "Russo One", sans-serif;
    font-size: 1.1rem;
    letter-spacing: 2px;
    color: var(--accent);
  }
  .prayer .name {
    margin-top: 6px;
    font-size: 0.75rem;
    color: rgba(255,255,255,0.5);
    letter-spacing: 1px;
  }

  /* ---------- Test panel ---------- */

  .panel {
    position: absolute;
    bottom: 24px; left: 50%;
    transform: translateX(-50%);
    display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
    z-index: 5;
    max-width: 90%;
  }
  .panel button {
    background: rgba(255,255,255,0.06);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.12);
    padding: 10px 16px;
    font-family: "Russo One", sans-serif;
    font-size: 0.85rem;
    letter-spacing: 1px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 120ms;
  }
  .panel button:hover {
    background: rgba(255,255,255,0.12);
    border-color: rgba(255,255,255,0.25);
  }

  .hint {
    position: absolute; top: 80px; left: 50%; transform: translateX(-50%);
    font-size: 0.75rem; color: rgba(255,255,255,0.4);
    letter-spacing: 1px;
  }

  /* ---------- The combo label (the star of the show) ---------- */

  .combo-label {
    position: absolute;
    top: 38%;
    left: 50%;
    font-family: "Bowlby One SC", "Russo One", sans-serif;
    font-size: clamp(3rem, 9vw, 7rem);
    font-style: italic;
    letter-spacing: 2px;
    text-transform: uppercase;
    pointer-events: none;
    white-space: nowrap;
    z-index: 10;
    transform-origin: center;
    -webkit-text-stroke: 4px #000;
    paint-order: stroke fill;
    text-shadow:
      0 0 20px currentColor,
      0 6px 0 rgba(0,0,0,0.6),
      0 12px 30px rgba(0,0,0,0.8);
  }
  .combo-label.from-right {
    animation: comboFromRight 900ms cubic-bezier(.18,.89,.32,1.28) forwards;
  }
  .combo-label.from-left {
    animation: comboFromLeft 900ms cubic-bezier(.18,.89,.32,1.28) forwards;
  }
  .combo-label.from-top {
    animation: comboFromTop 1100ms cubic-bezier(.18,.89,.32,1.28) forwards;
  }
  .combo-label.huge {
    font-size: clamp(4rem, 14vw, 11rem);
    animation-duration: 1400ms;
  }

  /* The keyframes — the magic is in the overshoot + hit-stop */
  @keyframes comboFromRight {
    0%   { transform: translate(calc(-50% + 600px), 0) scale(0.4) rotate(-12deg); opacity: 0; filter: blur(14px); }
    35%  { transform: translate(calc(-50% - 30px), 0) scale(1.45) rotate(-12deg); opacity: 1; filter: blur(0); }
    /* hit-stop: hold the peak for ~60ms */
    42%  { transform: translate(calc(-50% - 30px), 0) scale(1.45) rotate(-12deg); }
    55%  { transform: translate(-50%, 0) scale(0.92) rotate(-12deg); }
    65%  { transform: translate(-50%, 0) scale(1.05) rotate(-12deg); }
    75%  { transform: translate(-50%, 0) scale(1) rotate(-12deg); opacity: 1; }
    100% { transform: translate(-50%, -40px) scale(0.9) rotate(-12deg); opacity: 0; }
  }
  @keyframes comboFromLeft {
    0%   { transform: translate(calc(-50% - 600px), 0) scale(0.4) rotate(8deg); opacity: 0; filter: blur(14px); }
    35%  { transform: translate(calc(-50% + 30px), 0) scale(1.45) rotate(8deg); opacity: 1; filter: blur(0); }
    42%  { transform: translate(calc(-50% + 30px), 0) scale(1.45) rotate(8deg); }
    55%  { transform: translate(-50%, 0) scale(0.92) rotate(8deg); }
    65%  { transform: translate(-50%, 0) scale(1.05) rotate(8deg); }
    75%  { transform: translate(-50%, 0) scale(1) rotate(8deg); opacity: 1; }
    100% { transform: translate(-50%, -40px) scale(0.9) rotate(8deg); opacity: 0; }
  }
  @keyframes comboFromTop {
    0%   { transform: translate(-50%, -400px) scale(0.3) rotate(-5deg); opacity: 0; filter: blur(14px); }
    30%  { transform: translate(-50%, 30px) scale(1.6) rotate(-5deg); opacity: 1; filter: blur(0); }
    38%  { transform: translate(-50%, 30px) scale(1.6) rotate(-5deg); }
    52%  { transform: translate(-50%, 0) scale(0.9) rotate(-5deg); }
    62%  { transform: translate(-50%, 0) scale(1.08) rotate(-5deg); }
    75%  { transform: translate(-50%, 0) scale(1) rotate(-5deg); opacity: 1; }
    100% { transform: translate(-50%, -60px) scale(0.85) rotate(-5deg); opacity: 0; }
  }

  /* Color variants */
  .combo-label.ontime {
    color: var(--on-time);
    background: linear-gradient(180deg, #fff700 0%, var(--on-time) 50%, var(--on-time-2) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .combo-label.jamaa {
    color: var(--jamaa);
    background: linear-gradient(180deg, #b3b8ff 0%, var(--jamaa) 50%, var(--jamaa-2) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .combo-label.double {
    color: var(--double);
    background: linear-gradient(180deg, #ffe066 0%, var(--double-2) 40%, var(--double) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .combo-label.perfect {
    color: var(--perfect);
    background: linear-gradient(180deg, #ffffff 0%, #ffeb3b 40%, #ff8a00 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* ---------- The +1 flying score ---------- */

  .floating-plus {
    position: absolute;
    font-family: "Russo One", sans-serif;
    font-style: italic;
    font-size: 2rem;
    font-weight: 900;
    pointer-events: none;
    z-index: 8;
    -webkit-text-stroke: 3px #000;
    paint-order: stroke fill;
    transform: translate(-50%, -50%);
  }
  .floating-plus.ontime { color: var(--on-time); text-shadow: 0 0 20px var(--on-time-2); }
  .floating-plus.jamaa  { color: #aab0ff; text-shadow: 0 0 20px var(--jamaa); }

  /* ---------- Screen flash ---------- */

  .screen-flash {
    position: fixed; inset: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
    z-index: 20;
  }
  .screen-flash.flash {
    animation: screenFlash 180ms ease-out;
  }
  .screen-flash.flash-strong {
    animation: screenFlashStrong 280ms ease-out;
  }
  @keyframes screenFlash {
    0%, 100% { opacity: 0; }
    20%      { opacity: 0.18; }
  }
  @keyframes screenFlashStrong {
    0%, 100% { opacity: 0; }
    15%      { opacity: 0.45; }
  }

  /* ---------- Particles burst ---------- */

  .spark {
    position: absolute;
    width: 8px; height: 8px;
    background: currentColor;
    pointer-events: none;
    z-index: 7;
    transform: translate(-50%, -50%) rotate(45deg);
    box-shadow: 0 0 8px currentColor;
  }

  /* ---------- Combo counter (top-right) ---------- */

  .combo-counter {
    position: absolute;
    top: 100px; right: 40px;
    font-family: "Bowlby One SC", sans-serif;
    font-style: italic;
    pointer-events: none;
    text-align: right;
    transform-origin: right center;
    -webkit-text-stroke: 3px #000;
    paint-order: stroke fill;
    opacity: 0;
    transition: opacity 200ms;
  }
  .combo-counter.active { opacity: 1; }
  .combo-counter .word {
    font-size: 1.2rem;
    color: #fff;
    letter-spacing: 2px;
    line-height: 1;
  }
  .combo-counter .num {
    font-size: 4rem;
    color: var(--on-time);
    background: linear-gradient(180deg, #fff 0%, var(--on-time) 50%, var(--on-time-2) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1;
    display: inline-block;
    animation: comboCounterPulse 280ms ease-out;
  }
  @keyframes comboCounterPulse {
    0%   { transform: scale(1.5); }
    50%  { transform: scale(0.92); }
    100% { transform: scale(1); }
  }

</style>
</head>
<body>

<div class="stage" id="stage">

  <div class="counters">
    <div class="counter streak" id="c-streak">
      <span class="icon">🔥</span>
      <span class="num"><span id="n-streak">12</span></span>
    </div>
    <div class="counter ontime" id="c-ontime">
      <span class="icon">⚡</span>
      <span class="num">x<span id="n-ontime">47</span></span>
    </div>
    <div class="counter jamaa" id="c-jamaa">
      <span class="icon">👊</span>
      <span class="num">x<span id="n-jamaa">23</span></span>
    </div>
  </div>

  <div class="hint">Clique sur le cercle, ou utilise les boutons pour tester chaque effet</div>

  <div class="prayer" id="prayer" onclick="randomHit(event)">
    <div class="label">DHUHR</div>
    <div class="name">Tap to log</div>
  </div>

  <div class="combo-counter" id="combo-counter">
    <div class="word">COMBO</div>
    <div>x<span class="num" id="combo-num">0</span></div>
  </div>

  <div class="panel">
    <button onclick="hitOnTime()">⚡ ON TIME!</button>
    <button onclick="hitJamaa()">👊 JAMAA!</button>
    <button onclick="hitDouble()">💥 DOUBLE HIT!</button>
    <button onclick="hitPerfect()">🌟 PERFECT DAY!</button>
    <button onclick="hitMashallah()">✨ MASHA'ALLAH!</button>
    <button onclick="hitTakbir()">🎯 TAKBIR!</button>
    <button onclick="rapidCombo()">🔥 Rapid combo</button>
  </div>

  <div class="screen-flash" id="flash"></div>
</div>

<script>
  const stage = document.getElementById('stage');
  const flash = document.getElementById('flash');
  const comboCounter = document.getElementById('combo-counter');
  const comboNum = document.getElementById('combo-num');

  let comboCount = 0;
  let comboTimer = null;

  // -------- Helpers --------

  function spawnLabel(text, variant, direction = 'from-right', huge = false) {
    const el = document.createElement('div');
    el.className = `combo-label ${variant} ${direction}` + (huge ? ' huge' : '');
    el.textContent = text;
    stage.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }

  function flashScreen(strong = false) {
    flash.classList.remove('flash', 'flash-strong');
    void flash.offsetWidth; // restart animation
    flash.classList.add(strong ? 'flash-strong' : 'flash');
  }

  function spawnFloatingPlus(x, y, variant, targetEl) {
    const el = document.createElement('div');
    el.className = `floating-plus ${variant}`;
    el.textContent = '+1';
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    stage.appendChild(el);

    const target = targetEl.getBoundingClientRect();
    const tx = target.left + target.width / 2;
    const ty = target.top + target.height / 2;

    // Parabolic-ish trajectory using two stage Web Animations
    el.animate([
      { transform: `translate(-50%, -50%) translate(${x}px, ${y}px) scale(1)`, opacity: 1, filter: 'blur(0)' },
      { transform: `translate(-50%, -50%) translate(${(x+tx)/2}px, ${Math.min(y, ty) - 80}px) scale(1.4)`, opacity: 1, offset: 0.5 },
      { transform: `translate(-50%, -50%) translate(${tx}px, ${ty}px) scale(0.6)`, opacity: 0, filter: 'blur(3px)' },
    ], {
      duration: 700,
      easing: 'cubic-bezier(.45,.05,.55,.95)',
      fill: 'forwards',
    }).onfinish = () => {
      el.remove();
      pulseCounter(targetEl);
    };

    // Override absolute positioning since we use translate
    el.style.left = '0';
    el.style.top = '0';
  }

  function pulseCounter(counterEl) {
    counterEl.classList.remove('hit');
    void counterEl.offsetWidth;
    counterEl.classList.add('hit');
    // Increment number
    const numSpan = counterEl.querySelector('.num span');
    if (numSpan) {
      numSpan.textContent = parseInt(numSpan.textContent || '0', 10) + 1;
    }
  }

  function spawnSparks(x, y, color, count = 8) {
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 * i) / count + Math.random() * 0.4;
      const dist = 60 + Math.random() * 60;
      const dx = Math.cos(angle) * dist;
      const dy = Math.sin(angle) * dist;
      const s = document.createElement('div');
      s.className = 'spark';
      s.style.left = x + 'px';
      s.style.top = y + 'px';
      s.style.color = color;
      stage.appendChild(s);
      s.animate([
        { transform: 'translate(-50%, -50%) rotate(45deg) scale(1)', opacity: 1 },
        { transform: `translate(-50%, -50%) translate(${dx}px, ${dy}px) rotate(135deg) scale(0)`, opacity: 0 },
      ], {
        duration: 500 + Math.random() * 200,
        easing: 'cubic-bezier(.2,.7,.3,1)',
        fill: 'forwards',
      }).onfinish = () => s.remove();
    }
  }

  function bumpComboCounter() {
    comboCount++;
    comboNum.textContent = comboCount;
    comboCounter.classList.add('active');
    // re-trigger pulse
    comboNum.style.animation = 'none';
    void comboNum.offsetWidth;
    comboNum.style.animation = '';

    clearTimeout(comboTimer);
    comboTimer = setTimeout(() => {
      comboCounter.classList.remove('active');
      comboCount = 0;
    }, 1800);
  }

  // -------- Hit triggers --------

  function getClickPoint(e) {
    if (!e) {
      const r = document.getElementById('prayer').getBoundingClientRect();
      return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
    }
    return { x: e.clientX, y: e.clientY };
  }

  function hitOnTime(e) {
    const { x, y } = getClickPoint(e);
    spawnLabel('ON TIME!', 'ontime', 'from-right');
    spawnSparks(x, y, '#ffd000', 10);
    spawnFloatingPlus(x, y, 'ontime', document.getElementById('c-ontime'));
    flashScreen(false);
    bumpComboCounter();
  }
  function hitJamaa(e) {
    const { x, y } = getClickPoint(e);
    spawnLabel('JAMAA!', 'jamaa', 'from-left');
    spawnSparks(x, y, '#6a5cff', 10);
    spawnFloatingPlus(x, y, 'jamaa', document.getElementById('c-jamaa'));
    flashScreen(false);
    bumpComboCounter();
  }
  function hitDouble(e) {
    const { x, y } = getClickPoint(e);
    spawnLabel('DOUBLE HIT!', 'double', 'from-top', true);
    spawnSparks(x, y, '#ff2a4d', 14);
    spawnFloatingPlus(x, y - 30, 'ontime', document.getElementById('c-ontime'));
    setTimeout(() => spawnFloatingPlus(x, y + 10, 'jamaa', document.getElementById('c-jamaa')), 120);
    flashScreen(true);
    bumpComboCounter();
  }
  function hitPerfect(e) {
    const { x, y } = getClickPoint(e);
    spawnLabel("PERFECT DAY!", 'perfect', 'from-top', true);
    spawnSparks(x, y, '#ffeb3b', 20);
    flashScreen(true);
    setTimeout(() => flashScreen(false), 400);
  }
  function hitMashallah() {
    spawnLabel("MASHA'ALLAH!", 'perfect', 'from-top', true);
    flashScreen(true);
  }
  function hitTakbir() {
    spawnLabel('TAKBIR!', 'double', 'from-top', true);
    flashScreen(true);
    setTimeout(() => flashScreen(true), 300);
  }
  function rapidCombo() {
    let i = 0;
    const fire = () => {
      const r = document.getElementById('prayer').getBoundingClientRect();
      const x = r.left + r.width / 2 + (Math.random() - 0.5) * 80;
      const y = r.top + r.height / 2 + (Math.random() - 0.5) * 80;
      const fns = [() => hitOnTime({clientX: x, clientY: y}), () => hitJamaa({clientX: x, clientY: y})];
      fns[i % 2]();
      i++;
      if (i < 5) setTimeout(fire, 200);
    };
    fire();
  }

  function randomHit(e) {
    const r = Math.random();
    if (r < 0.4) hitOnTime(e);
    else if (r < 0.7) hitJamaa(e);
    else if (r < 0.9) hitDouble(e);
    else hitPerfect(e);
  }
</script>

</body>
</html>
